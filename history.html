<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>BusinessForgeSA Audit History</title>
<style>
:root{color-scheme:dark;--bg:#020617;--panel:#0f172a;--line:#334155;--text:#e2e8f0;--muted:#94a3b8;--accent:#818cf8}
*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at top right,#312e8160,transparent 28rem),var(--bg);color:var(--text);font-family:Arial,sans-serif}
main{width:min(1400px,calc(100% - 28px));margin:auto;padding:28px 0 60px}.panel{background:#0f172ae8;border:1px solid var(--line);border-radius:16px;padding:18px}
h1,h2,h3,p{margin-top:0}.muted{color:var(--muted);line-height:1.55}.eyebrow{color:var(--accent);font-size:12px;font-weight:800;letter-spacing:.13em;text-transform:uppercase}
button,input,select{font:inherit}button{cursor:pointer}.primary,.secondary,.danger{border-radius:10px;padding:11px 14px;font-weight:800}.primary{border:0;background:linear-gradient(135deg,#4f46e5,#7c3aed);color:white}.secondary{border:1px solid var(--line);background:#1e293b;color:var(--text)}.danger{border:1px solid #be123c;background:#4c0519;color:#fecdd3}
input,select{width:100%;min-height:44px;border:1px solid var(--line);border-radius:10px;padding:10px;background:#020617;color:var(--text)}
.hidden{display:none!important}.access{max-width:560px;margin:70px auto}.row{display:flex;gap:10px;flex-wrap:wrap}.top{display:flex;justify-content:space-between;gap:18px;align-items:flex-start;margin-bottom:20px}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}.value{font-size:28px;font-weight:900;margin-top:8px}
.filters{display:grid;grid-template-columns:2fr 1fr 1fr auto;gap:12px;margin-bottom:16px}.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:15px}
.card{display:grid;gap:14px}.cardhead{display:flex;justify-content:space-between;gap:12px}.title{font-size:19px;font-weight:900}.small{font-size:12px;color:var(--muted)}
.badges{display:flex;gap:7px;flex-wrap:wrap}.badge{padding:5px 9px;border-radius:999px;font-size:11px;font-weight:900;background:#312e81}.risk-High,.risk-Critical{background:#881337}.risk-Low{background:#065f46}.risk-Medium{background:#92400e}
.metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.metric{text-align:center;background:#020617;border:1px solid var(--line);border-radius:10px;padding:9px}.metric strong{display:block;font-size:18px}.metric span{font-size:11px;color:var(--muted)}
.pagination{display:flex;justify-content:space-between;align-items:center;margin-top:18px}.error{display:none;color:#fecaca;background:#450a0a;border:1px solid #ef4444;border-radius:10px;padding:10px;margin-top:12px}
.modal{position:fixed;inset:0;background:#020617e8;display:grid;place-items:center;padding:16px;z-index:20}.modalbox{width:min(1000px,100%);max-height:92vh;overflow:auto;background:#07101f;border:1px solid var(--line);border-radius:16px;padding:22px}
.section{margin:22px 0}.section h3{color:var(--accent);font-size:13px;text-transform:uppercase;border-bottom:1px solid var(--line);padding-bottom:8px}.item{background:#0f172a;border:1px solid var(--line);border-radius:10px;padding:12px;margin-bottom:9px;line-height:1.55}
.compare{display:grid;grid-template-columns:1fr 1fr;gap:12px}@media(max-width:900px){.stats,.grid,.compare{grid-template-columns:1fr}.filters{grid-template-columns:1fr 1fr}}@media(max-width:600px){.top,.cardhead,.pagination{flex-direction:column}.filters{grid-template-columns:1fr}}
</style>
</head>
<body>
<main>
<section id="login" class="panel access">
<div class="eyebrow">Owner Access</div><h1>Audit History</h1>
<p class="muted">Enter the private key configured as HISTORY_ADMIN_KEY in Vercel.</p>
<input id="key" type="password" placeholder="History access key">
<div class="row" style="margin-top:14px"><button id="unlock" class="primary">Open History</button><a href="/" class="secondary" style="text-decoration:none">Return</a></div>
<div id="error" class="error"></div>
</section>

<section id="app" class="hidden">
<div class="top"><div><div class="eyebrow">Business Intelligence Archive</div><h1>Audit History</h1><p class="muted">Open, filter and compare completed audits.</p></div>
<div class="row"><button id="refresh" class="secondary">Refresh</button><button id="lock" class="danger">Lock</button><a href="/" class="secondary" style="text-decoration:none">Workspace</a></div></div>

<div class="stats">
<div class="panel"><div class="eyebrow">Total Reports</div><div id="sTotal" class="value">0</div></div>
<div class="panel"><div class="eyebrow">Average Score</div><div id="sScore" class="value">0%</div></div>
<div class="panel"><div class="eyebrow">High/Critical</div><div id="sRisk" class="value">0</div></div>
<div class="panel"><div class="eyebrow">Comparison</div><div id="sSelected" class="value">0 / 2</div></div>
</div>

<div class="panel filters">
<input id="search" placeholder="Search summaries or submitted data">
<select id="module"><option value="">All modules</option></select>
<select id="risk"><option value="">All risks</option><option>Low</option><option>Medium</option><option>High</option><option>Critical</option></select>
<div class="row"><button id="apply" class="primary">Apply</button><button id="clear" class="secondary">Clear</button></div>
</div>

<div id="compareBar" class="panel hidden" style="margin-bottom:15px"><div class="row" style="justify-content:space-between"><strong>Two reports selected</strong><button id="compareBtn" class="primary">Compare Reports</button></div></div>
<div id="grid" class="grid"></div>
<div class="pagination"><button id="prev" class="secondary">Previous</button><span id="page" class="muted"></span><button id="next" class="secondary">Next</button></div>
</section>
</main>

<div id="modal" class="modal hidden"><div class="modalbox"><div class="top"><div><div id="mEye" class="eyebrow"></div><h2 id="mTitle"></h2><p id="mSub" class="muted"></p></div><button id="close" class="secondary">Close</button></div><div id="mBody"></div></div></div>

<script>
const SIZE=50,state={key:sessionStorage.getItem("bfsa_history_key")||"",reports:[],total:0,offset:0,selected:[]};
const $=id=>document.getElementById(id),esc=v=>String(v??"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;");
const date=v=>v?new Intl.DateTimeFormat("en-ZA",{dateStyle:"medium",timeStyle:"short"}).format(new Date(v)):"Unknown date";
function query(){const p=new URLSearchParams({limit:SIZE,offset:state.offset});if($("search").value.trim())p.set("search",$("search").value.trim());if($("module").value)p.set("moduleId",$("module").value);if($("risk").value)p.set("riskRating",$("risk").value);return p}
async function load(){ $("grid").innerHTML='<div class="panel muted">Loading...</div>';const r=await fetch("/api/audit-history?"+query(),{headers:{"x-history-key":state.key}});const x=await r.json();if(!r.ok)throw Error(x.error||"History request failed");state.reports=x.reports||[];state.total=x.pagination?.total||0;render()}
function render(){
const modules=new Map([...$("module").options].map(o=>[o.value,o.textContent]));state.reports.forEach(r=>{if(r.moduleId&&!modules.has(r.moduleId)){const o=document.createElement("option");o.value=r.moduleId;o.textContent=r.moduleName;$("module").appendChild(o);modules.set(r.moduleId,r.moduleName)}});
$("grid").innerHTML=state.reports.length?state.reports.map(card).join(""):'<div class="panel muted">No audits match these filters.</div>';
$("grid").querySelectorAll("button[data-open]").forEach(b=>b.onclick=()=>openReport(state.reports.find(r=>String(r.id)===b.dataset.open)));
$("grid").querySelectorAll("button[data-pick]").forEach(b=>b.onclick=()=>pick(b.dataset.pick));
const scores=state.reports.map(r=>Number(r.complianceScore)).filter(Number.isFinite);$("sTotal").textContent=state.total;$("sScore").textContent=(scores.length?Math.round(scores.reduce((a,b)=>a+b,0)/scores.length):0)+"%";$("sRisk").textContent=state.reports.filter(r=>["High","Critical"].includes(r.riskRating)).length;$("sSelected").textContent=state.selected.length+" / 2";$("compareBar").classList.toggle("hidden",state.selected.length!==2);
$("prev").disabled=state.offset===0;$("next").disabled=state.offset+state.reports.length>=state.total;$("page").textContent=state.total?`Showing ${state.offset+1}-${Math.min(state.offset+state.reports.length,state.total)} of ${state.total}`:"No reports";
}
function card(r){const picked=state.selected.includes(String(r.id));return `<article class="panel card"><div class="cardhead"><div><div class="title">${esc(r.moduleName)}</div><div class="small">${esc(date(r.createdAt))}</div></div><div class="badges"><span class="badge risk-${esc(r.riskRating)}">${esc(r.riskRating)} Risk</span><span class="badge">${esc(r.complianceScore)}%</span></div></div><p class="muted">${esc(r.executiveSummary||"No summary stored.")}</p><div class="metrics"><div class="metric"><strong>${r.counts?.findings||0}</strong><span>Findings</span></div><div class="metric"><strong>${r.counts?.recommendations||0}</strong><span>Actions</span></div><div class="metric"><strong>${r.counts?.opportunities||0}</strong><span>Opportunities</span></div></div><div class="row"><button class="primary" data-open="${esc(r.id)}">Open</button><button class="secondary" data-pick="${esc(r.id)}">${picked?"Remove":"Compare"}</button></div></article>`}
function pick(id){const i=state.selected.indexOf(id);if(i>=0)state.selected.splice(i,1);else if(state.selected.length<2)state.selected.push(id);else alert("Select only two reports.");render()}
function items(a,f){return Array.isArray(a)&&a.length?a.map(f).join(""):'<div class="muted">No information stored.</div>'}
function section(t,c){return `<section class="section"><h3>${esc(t)}</h3>${c}</section>`}
function openReport(r){$("mEye").textContent=r.moduleId;$("mTitle").textContent=r.moduleName;$("mSub").textContent=`${date(r.createdAt)} · ${r.riskRating} Risk · ${r.complianceScore}%`;$("mBody").innerHTML=section("Executive Summary",`<div class="item">${esc(r.executiveSummary)}</div>`)+section("Key Strengths",items(r.keyStrengths,(x,i)=>`<div class="item"><b>${i+1}.</b> ${esc(x)}</div>`))+section("Critical Findings",items(r.criticalFindings,(x,i)=>`<div class="item"><b>${i+1}. ${esc(x.category||"General")}</b><br>Severity: ${esc(x.severity)}<br>Issue: ${esc(x.issue)}${x.impact?`<br>Impact: ${esc(x.impact)}`:""}${x.recommendation?`<br>Recommendation: ${esc(x.recommendation)}`:""}</div>`))+section("Strategic Opportunities",items(r.strategicOpportunities,(x,i)=>`<div class="item"><b>${i+1}. ${esc(x.opportunity)}</b>${x.potentialBenefit?`<br>Benefit: ${esc(x.potentialBenefit)}`:""}${x.recommendedAction?`<br>Action: ${esc(x.recommendedAction)}`:""}</div>`))+section("Recommended Actions",items(r.recommendedActions,(x,i)=>`<div class="item"><b>${i+1}. ${esc(x.action)}</b>${x.priority?`<br>Priority: ${esc(x.priority)}`:""}${x.owner?`<br>Owner: ${esc(x.owner)}`:""}</div>`))+section("Original Input",`<div class="item" style="white-space:pre-wrap">${esc(r.rawInput)}</div>`);$("modal").classList.remove("hidden")}
function compare(){const a=state.selected.map(id=>state.reports.find(r=>String(r.id)===id)).filter(Boolean);if(a.length!==2)return;$("mEye").textContent="Audit Comparison";$("mTitle").textContent=a[0].moduleName+" vs "+a[1].moduleName;$("mSub").textContent="Side-by-side report comparison";$("mBody").innerHTML=`<div class="compare">${a.map(r=>`<div class="panel"><h3>${esc(r.moduleName)}</h3><p class="muted">${esc(date(r.createdAt))}</p><div class="badges"><span class="badge risk-${esc(r.riskRating)}">${esc(r.riskRating)} Risk</span><span class="badge">${r.complianceScore}%</span></div><p>${esc(r.executiveSummary)}</p><div class="metrics"><div class="metric"><strong>${r.counts.findings}</strong><span>Findings</span></div><div class="metric"><strong>${r.counts.recommendations}</strong><span>Actions</span></div><div class="metric"><strong>${r.counts.opportunities}</strong><span>Opportunities</span></div></div></div>`).join("")}</div>`;$("modal").classList.remove("hidden")}
async function unlock(){state.key=$("key").value.trim();if(!state.key)return;try{await load();sessionStorage.setItem("bfsa_history_key",state.key);$("login").classList.add("hidden");$("app").classList.remove("hidden")}catch(e){$("error").textContent=e.message;$("error").style.display="block"}}
$("unlock").onclick=unlock;$("lock").onclick=()=>{sessionStorage.removeItem("bfsa_history_key");location.reload()};$("refresh").onclick=()=>load().catch(e=>alert(e.message));$("apply").onclick=()=>{state.offset=0;load().catch(e=>alert(e.message))};$("clear").onclick=()=>{$("search").value="";$("module").value="";$("risk").value="";state.offset=0;load()};$("prev").onclick=()=>{state.offset=Math.max(0,state.offset-SIZE);load()};$("next").onclick=()=>{state.offset+=SIZE;load()};$("compareBtn").onclick=compare;$("close").onclick=()=>$("modal").classList.add("hidden");$("modal").onclick=e=>{if(e.target===$("modal"))$("modal").classList.add("hidden")};$("key").onkeydown=e=>{if(e.key==="Enter")unlock()};if(state.key){$("key").value=state.key;unlock()}
</script>
</body>
</html>
